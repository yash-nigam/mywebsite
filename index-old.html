<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Alex Rivera • Portfolio</title>
    <!-- Bootstrap 5 + Icons -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css" rel="stylesheet">
    <!-- Custom CSS -->
    <link href="css/custom.css" rel="stylesheet">
</head>
<body class="bg-light">
    <!-- TOP HORIZONTAL BANNER / NAVBAR -->
    <nav class="navbar navbar-dark bg-dark shadow-sm">
        <div class="container-fluid">
            <a class="navbar-brand fw-bold fs-4" href="#">Alex Rivera</a>
            <span class="navbar-text text-light">Software Engineer &amp; Designer</span>
        </div>
    </nav>

    <div class="container-fluid">
        <div class="row vh-100">
            <!-- LEFT VERTICAL MENU (constant) -->
            <div class="col-md-3 col-lg-2 bg-white border-end shadow-sm p-0">
                <div class="p-3">
                    <h5 class="text-uppercase text-muted small mb-3 ps-3">Navigation</h5>
                    <div class="nav flex-column nav-pills">
                        <a href="#" onclick="loadPage('resume.html'); return false;" class="nav-link active" id="nav-resume">
                            <i class="bi bi-file-earmark-person me-2"></i> Resume
                        </a>
                        <a href="#" onclick="loadPage('work.html'); return false;" class="nav-link" id="nav-work">
                            <i class="bi bi-briefcase me-2"></i> Works
                        </a>
                        <a href="#" onclick="loadPage('notes.html'); return false;" class="nav-link" id="nav-notes">
                            <i class="bi bi-journal-text me-2"></i> Notes
                        </a>
                    </div>
                </div>
            </div>

            <!-- RIGHT CONTENT AREA (changes dynamically) -->
            <div class="col-md-9 col-lg-10 p-0 overflow-auto" id="content-area">
                <!-- Default home content (shown first) -->
                <div class="p-5" id="default-content">
                    <div class="text-center py-5">
                        <img src="https://picsum.photos/id/1011/300/300" alt="Profile" class="rounded-circle mb-4 shadow" width="180">
                        <h1 class="display-5 fw-bold">Welcome, I'm Alex Rivera</h1>
                        <p class="lead text-muted">Full-stack engineer with 8+ years building beautiful digital experiences.<br>Click any link on the left to explore.</p>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <script>
        function loadPage(page) {
            // Highlight active link
            document.querySelectorAll('.nav-link').forEach(link => link.classList.remove('active'));
            const activeLink = document.getElementById('nav-' + page.replace('.html', ''));
            if (activeLink) activeLink.classList.add('active');

            fetch(page)
                .then(response => response.text())
                .then(html => {
                    const parser = new DOMParser();
                    const doc = parser.parseFromString(html, 'text/html');
                    const contentHTML = doc.body.innerHTML;   // only the body content

                    document.getElementById('default-content').style.display = 'none';
                    const contentArea = document.getElementById('content-area');
                    contentArea.innerHTML = contentHTML;
                })
                .catch(err => {
                    console.error(err);
                    document.getElementById('content-area').innerHTML = `<div class="alert alert-danger m-5">Error loading ${page}</div>`;
                });
        }

        // Optional: make sidebar sticky on mobile
        window.addEventListener('resize', () => {
            if (window.innerWidth < 768) {
                document.querySelector('.col-md-3').classList.add('position-fixed');
            }
        });
    </script>
</body>
</html>
