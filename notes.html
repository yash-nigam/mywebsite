<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Notes - Yash Nigam</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">

  <!-- Optional: basic markdown styling improvements -->
  <style>
    .markdown-body {
      line-height: 1.6;
      font-size: 1.05rem;
    }
    .markdown-body pre { background: #f8f9fa; padding: 1rem; border-radius: .375rem; overflow-x: auto; }
    .markdown-body code { background: #f8f9fa; padding: .2em .4em; border-radius: .25rem; }
    .markdown-body h1, .markdown-body h2, .markdown-body h3 { margin: 2rem 0 1rem; }
    .markdown-body table { border-collapse: collapse; width: 100%; }
    .markdown-body th, .markdown-body td { border: 1px solid #dee2e6; padding: .75rem; }
    .markdown-body th { background: #f1f3f5; }
  </style>
</head>
<body class="bg-light">

<div class="container py-5">
  <h1 class="mb-4">Notes & Insights</h1>

  <div class="accordion" id="notesAccordion">

    <!-- Note 1 -->
    <div class="accordion-item">
      <h2 class="accordion-header">
        <button class="accordion-button" type="button" data-bs-toggle="collapse" data-bs-target="#note1">
          The Pragmatic SRE - Key Principles
        </button>
      </h2>
      <div id="note1" class="accordion-collapse collapse show" data-bs-parent="#notesAccordion">
        <div id="note1-content" class="accordion-body markdown-body">
          <div class="text-center py-5"><div class="spinner-border text-primary" role="status"></div></div>
        </div>
      </div>
    </div>

    <!-- Note 2 -->
    <div class="accordion-item">
      <h2 class="accordion-header">
        <button class="accordion-button collapsed" type="button" data-bs-toggle="collapse" data-bs-target="#note2">
          SRE Golden Signals
        </button>
      </h2>
      <div id="note2" class="accordion-collapse collapse" data-bs-parent="#notesAccordion">
        <div id="note2-content" class="accordion-body markdown-body">
          <div class="text-center py-5"><div class="spinner-border text-primary" role="status"></div></div>
        </div>
      </div>
    </div>

     <!-- Note 3 -->
    <div class="accordion-item">
      <h2 class="accordion-header">
        <button class="accordion-button collapsed" type="button" data-bs-toggle="collapse" data-bs-target="#note3">
          Error Budget
        </button>
      </h2>
      <div id="note3" class="accordion-collapse collapse" data-bs-parent="#notesAccordion">
        <div id="note3-content" class="accordion-body markdown-body">
          <div class="text-center py-5"><div class="spinner-border text-primary" role="status"></div></div>
        </div>
      </div>
    </div>
    
    <!-- Note 4 -->
    <div class="accordion-item">
      <h2 class="accordion-header">
        <button class="accordion-button collapsed" type="button" data-bs-toggle="collapse" data-bs-target="#note4">
          Customer User Journeys, SLI &amp; SLO
        </button>
      </h2>
      <div id="note4" class="accordion-collapse collapse" data-bs-parent="#notesAccordion">
        <div id="note4-content" class="accordion-body markdown-body">
          <div class="text-center py-5"><div class="spinner-border text-primary" role="status"></div></div>
        </div>
      </div>
    </div>
  </div>
</div>

<!-- Add note3 and note4 the same way -->
<!-- Libraries -->
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>

<script>
  // Map: target element id → markdown filename
  const notes = {
    'note1-content': 'Notes/SRE/pragmatricsre-keyprinciples.md',
    'note2-content': 'Notes/SRE/pragmatricsre-Golden-Signals.md',
    'note3-content': 'Notes/SRE/pragmatricsre-Error-Budget.md',
    'note4-content': 'Notes/SRE/pragmatricsre-CUJ-SLI-SLO.md'
  };

  document.addEventListener('DOMContentLoaded', () => {
    Object.entries(notes).forEach(([id, filename]) => {
      fetch(filename)
        .then(response => {
          if (!response.ok) throw new Error(`HTTP ${response.status} – ${filename} not found`);
          return response.text();
        })
        .then(mdText => {
          const html = marked.parse(mdText, {
            gfm: true,          // GitHub Flavored Markdown
            breaks: true,       // line breaks → <br>
            headerIds: true     // nice heading anchors
          });
          document.getElementById(id).innerHTML = html;
        })
        .catch(err => {
          document.getElementById(id).innerHTML =
            `<div class="alert alert-danger">
              <strong>Error loading ${filename}</strong><br>${err.message}
            </div>`;
        });
    });
  });
</script>

</body>
</html>
