<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Yash Nigam</title>
    <!-- Bootstrap 5 + Icons -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css" rel="stylesheet">
    <!-- Custom CSS -->
    <link href="css/custom.css" rel="stylesheet">
    <style>
        #content-area {
            height: calc(100vh - 56px); /* navbar height */
        }
        #content-frame {
            width: 100%;
            height: 100%;
            border: none;
        }
    </style>
</head>
<body class="bg-light">
    <!-- TOP HORIZONTAL BANNER -->
    <nav class="navbar navbar-dark bg-dark shadow-sm">
        <div class="container-fluid">
            <a class="navbar-brand fw-bold fs-4" href="#">Yash Nigam</a>
            <span class="navbar-text text-light">Software Engineer</span>
        </div>
    </nav>

    <div class="container-fluid">
        <div class="row">
            <!-- LEFT VERTICAL MENU (constant) -->
            <div class="col-md-3 col-lg-2 bg-white border-end shadow-sm p-0">
                <div class="p-3">
                    <h5 class="text-uppercase text-muted small mb-3 ps-3">Navigation</h5>
                    <div class="nav flex-column nav-pills">
                        <a href="#" onclick="loadPage('resume.html'); return false;" class="nav-link active" id="nav-resume">
                            <i class="bi bi-file-earmark-person me-2"></i> Resume
                        </a>
                        <a href="#" onclick="loadPage('work.html'); return false;" class="nav-link" id="nav-work">
                            <i class="bi bi-briefcase me-2"></i> Work
                        </a>
                        <a href="#" onclick="loadPage('notes.html'); return false;" class="nav-link" id="nav-notes">
                            <i class="bi bi-journal-text me-2"></i> Notes
                        </a>
                    </div>
                </div>
            </div>

            <!-- RIGHT CONTENT AREA -->
            <div class="col-md-9 col-lg-10 p-0" id="content-area">
                <!-- Default welcome screen -->
                <div class="h-100 overflow-auto p-5" id="default-content">
                    <div class="text-center py-5">
                        <img src="https://media.licdn.com/dms/image/v2/C5603AQEmv9HUsefW-A/profile-displayphoto-shrink_400_400/profile-displayphoto-shrink_400_400/0/1592737534414?e=1775692800&v=beta&t=weswVmN36mcVUzY8MQaEoAJMMTJ-2CC9ut3-TJ6MnRU" alt="Profile" class="rounded-circle mb-4 shadow" width="180">
                        <h1 class="display-5 fw-bold">Welcome, I'm Yash Nigam</h1>
                        <p class="lead text-muted">Technical Specialist with 14+ years in IT..<br>Click any link on the left to explore.</p>
                    </div>
                </div>

                <!-- Dynamic iframe (replaces content) -->
                <iframe id="content-frame" class="d-none"></iframe>
            </div>
        </div>
    </div>

    <script>
        function loadPage(page) {
            // Highlight active link
            document.querySelectorAll('.nav-link').forEach(link => link.classList.remove('active'));
            const activeLink = document.getElementById('nav-' + page.replace('.html', ''));
            if (activeLink) activeLink.classList.add('active');

            // Hide welcome, show iframe with the page
            document.getElementById('default-content').classList.add('d-none');
            const frame = document.getElementById('content-frame');
            frame.src = page;
            frame.classList.remove('d-none');
        }
    </script>
</body>
</html>
